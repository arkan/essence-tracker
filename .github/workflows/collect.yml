name: Collect & Analyze fuel data

on:
  schedule:
    # 00h, 06h, 12h, 18h heure de Paris
    # Paris = UTC+1 (hiver) / UTC+2 (été)
    # On couvre les deux variantes, le job vérifie l'heure Paris réelle
    - cron: "0 4,5,10,11,16,17,22,23 * * *"
  workflow_dispatch: # manual trigger

permissions:
  contents: write
  pages: write
  id-token: write

env:
  TZ: Europe/Paris

jobs:
  collect-and-analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        if: env.SKIP != 'true'
        uses: actions/checkout@v4

      - name: Setup Go
        if: env.SKIP != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Setup Python
        if: env.SKIP != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: env.SKIP != 'true'
        run: pip install -r requirements.txt

      - name: Collect data from API
        if: env.SKIP != 'true'
        run: go run carburants_collector.go

      - name: Copy snapshot to raw/
        if: env.SKIP != 'true'
        run: |
          mkdir -p raw
          STAMP=$(python3 -c "
          import json, datetime, zoneinfo
          d = json.load(open('data/stations_latest.json'))
          dt = datetime.datetime.fromisoformat(d['meta']['date_collecte'])
          paris = dt.astimezone(zoneinfo.ZoneInfo('Europe/Paris'))
          print(paris.strftime('%Y-%m-%d_%Hh%M'))
          ")
          TARGET="raw/stations_${STAMP}.json"
          cp data/stations_latest.json "$TARGET"
          echo "Copied to $TARGET"

      - name: Run analysis
        if: env.SKIP != 'true'
        run: python analyze_trends.py

      - name: Commit and push
        if: env.SKIP != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add raw/ reports/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            STAMP=$(ls -t raw/stations_*.json | head -1 | sed 's/.*stations_//;s/\.json//')
            git commit -m "data: collecte ${STAMP}"
            git push
          fi

      - name: Prepare GitHub Pages
        if: env.SKIP != 'true'
        run: |
          mkdir -p _site
          LATEST=$(ls -t reports/rapport_*.html | head -1)
          cp "$LATEST" _site/index.html
          echo "Publishing $LATEST as index.html"

      - name: Upload Pages artifact
        if: env.SKIP != 'true'
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        if: env.SKIP != 'true'
        uses: actions/deploy-pages@v4
